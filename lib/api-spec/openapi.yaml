openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: search
    description: Metacognitive AI search operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /search/metacognitive:
    post:
      operationId: metacognitiveSearch
      tags: [search]
      summary: Run a metacognitive search
      description: |
        Accepts a research query (plus optional `code` and `mode`) and streams back
        structured metacognitive reasoning steps as Server-Sent Events (SSE). Each event
        is a JSON object on a `data:` line.

        Mode-dependent step ordering:
        - `research` (default): `started` → `token`* → `step`(DECOMPOSE → RETRIEVE+ → EVALUATE → PIVOT? → SYNTHESIZE) → `complete` → `{"done":true}`
        - `code`: same step order as research, applied to code review; the SYNTHESIZE
          `answer` field contains a fenced code block with the refactored code.
        - `web`: backend first emits `step`(WEB_SEARCH) with real sources fetched via
          OpenAI Responses API web_search, then `step`(DECOMPOSE → PATTERN → RETRIEVE+ →
          EVALUATE → PIVOT? → SYNTHESIZE).

        **SSE consumption note**: This endpoint uses `text/event-stream` and must be
        consumed with `fetch` + a `ReadableStream` reader (or `EventSource`). The
        generated OpenAI-style client stubs are not suitable for this endpoint because they
        model the response as a single resolved JSON value. Use the `use-search-stream`
        hook (or equivalent manual `fetch` streaming) to consume this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetacognitiveSearchRequest"
      responses:
        "200":
          description: SSE stream of metacognitive reasoning events
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/MetacognitiveSearchSseEvent"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /search/sample-queries:
    get:
      operationId: getSampleQueries
      tags: [search]
      summary: Get sample research queries
      description: Returns a list of sample research questions to demonstrate the metacognitive search system
      responses:
        "200":
          description: List of sample queries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SampleQueriesResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MetacognitiveSearchRequest:
      type: object
      properties:
        query:
          type: string
          description: The research question, or for code mode, a brief description of what the code does or what to focus on
        mode:
          type: string
          enum: [research, code, web]
          default: research
          description: |
            Search mode:
            - `research` — LLM-simulated metacognitive research (default)
            - `code` — paste code, get a metacognitive code review with refactored output
            - `web` — real web search with cross-source pattern detection
        code:
          type: string
          description: Source code to review (required when mode=code)
        maxDepth:
          type: integer
          description: Maximum number of retrieval iterations (capped at 5)
          default: 5
      required:
        - query

    # --- SSE event union ---
    MetacognitiveSearchSseEvent:
      oneOf:
        - $ref: "#/components/schemas/SseStartedEvent"
        - $ref: "#/components/schemas/SseTokenEvent"
        - $ref: "#/components/schemas/SseStepEvent"
        - $ref: "#/components/schemas/SseCompleteEvent"
        - $ref: "#/components/schemas/SseErrorEvent"
      discriminator:
        propertyName: type

    SseStartedEvent:
      type: object
      description: Emitted once when the stream begins
      properties:
        type:
          type: string
          enum: [started]
        query:
          type: string
      required: [type, query]

    SseTokenEvent:
      type: object
      description: Emitted for each streaming token from the LLM (live typing feed)
      properties:
        type:
          type: string
          enum: [token]
        content:
          type: string
      required: [type, content]

    SseStepEvent:
      type: object
      description: Emitted when a complete reasoning step is parsed from the stream
      properties:
        type:
          type: string
          enum: [step]
        stepType:
          type: string
          enum: [DECOMPOSE, RETRIEVE, EVALUATE, PIVOT, SYNTHESIZE, WEB_SEARCH, PATTERN, REFLECT]
        data:
          oneOf:
            - $ref: "#/components/schemas/DecomposeStepData"
            - $ref: "#/components/schemas/RetrieveStepData"
            - $ref: "#/components/schemas/EvaluateStepData"
            - $ref: "#/components/schemas/PivotStepData"
            - $ref: "#/components/schemas/SynthesizeStepData"
            - $ref: "#/components/schemas/WebSearchStepData"
            - $ref: "#/components/schemas/PatternStepData"
            - $ref: "#/components/schemas/ReflectStepData"
      required: [type, stepType, data]

    SseCompleteEvent:
      type: object
      description: Emitted after all steps have been streamed
      properties:
        type:
          type: string
          enum: [complete]
        totalSteps:
          type: integer
        rawResponse:
          type: string
      required: [type, totalSteps, rawResponse]

    SseErrorEvent:
      type: object
      description: Emitted if the LLM or server encounters an error mid-stream
      properties:
        type:
          type: string
          enum: [error]
        message:
          type: string
      required: [type, message]

    # --- Step data payloads ---
    DecomposeStepData:
      type: object
      description: Query decomposition into focused sub-questions
      properties:
        subQuestions:
          type: array
          items:
            type: string
        rationale:
          type: string
        strategy:
          type: string
          enum: [breadth_first, depth_first, comparative]
      required: [subQuestions, rationale, strategy]

    RetrieveStepData:
      type: object
      description: Simulated knowledge retrieval for a single sub-question
      properties:
        subQuestion:
          type: string
        sourceType:
          type: string
          enum: [empirical, theoretical, computational, clinical, review]
        findings:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        references:
          type: array
          items:
            type: string
      required: [subQuestion, sourceType, findings, confidence, references]

    EvaluateStepData:
      type: object
      description: Coverage evaluation and gap detection across retrieved knowledge
      properties:
        coverageAssessment:
          type: string
        overallConfidence:
          type: number
          minimum: 0
          maximum: 1
        gaps:
          type: array
          items:
            type: string
        conflictDetected:
          type: boolean
        conflictDescription:
          type: string
          nullable: true
      required: [coverageAssessment, overallConfidence, gaps, conflictDetected]

    PivotStepData:
      type: object
      description: Strategy pivot when gaps or conflicts require a new search direction
      properties:
        trigger:
          type: string
        oldDirection:
          type: string
        newDirection:
          type: string
        rationale:
          type: string
      required: [trigger, oldDirection, newDirection, rationale]

    SynthesizeStepData:
      type: object
      description: Final synthesis of all retrieved knowledge into a comprehensive answer
      properties:
        answer:
          type: string
        finalConfidence:
          type: number
          minimum: 0
          maximum: 1
        keyFindings:
          type: array
          items:
            type: string
        openQuestions:
          type: array
          items:
            type: string
        furtherReading:
          type: array
          items:
            type: string
      required: [answer, finalConfidence, keyFindings, openQuestions, furtherReading]

    WebSearchStepData:
      type: object
      description: Real web search results retrieved before the metacognitive flow runs (web mode only)
      properties:
        query:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/WebSource"
        totalSources:
          type: integer
      required: [query, sources, totalSources]

    WebSource:
      type: object
      properties:
        index:
          type: integer
          description: 1-based source index used for cross-references
        title:
          type: string
        url:
          type: string
        snippet:
          type: string
      required: [index, title, url, snippet]

    PatternStepData:
      type: object
      description: Cross-source pattern recognition over real web results (web mode only)
      properties:
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/DetectedPattern"
        dominantThemes:
          type: array
          items:
            type: string
        outliers:
          type: array
          items:
            type: string
      required: [patterns, dominantThemes, outliers]

    DetectedPattern:
      type: object
      properties:
        theme:
          type: string
        frequency:
          type: integer
          description: Number of sources in which this theme appears
        supportingSources:
          type: array
          description: 1-based source indices that support this pattern
          items:
            type: integer
      required: [theme, frequency, supportingSources]

    ReflectStepData:
      type: object
      description: Autonomous self-reflection — the model's first-person summary of personal observations and directions it would explore on its own initiative.
      properties:
        personalSummary:
          type: string
          description: 2-4 sentence first-person summary of what the model personally finds compelling or notable about the question and its own answer.
        interestingObservations:
          type: array
          description: Things that stood out to the model that did not fit cleanly into the formal reasoning steps.
          items:
            type: string
        autonomousExplorations:
          type: array
          description: Directions the model would explore further if given autonomy — speculative, opinionated, or off-script tangents.
          items:
            type: string
        selfAssessment:
          type: string
          description: Honest critique of the model's own reasoning — limitations, uncertainties, where it might be wrong.
      required: [personalSummary, interestingObservations, autonomousExplorations, selfAssessment]

    # --- Sample queries ---
    SampleQueriesResponse:
      type: object
      properties:
        queries:
          type: array
          items:
            $ref: "#/components/schemas/SampleQuery"
      required:
        - queries

    SampleQuery:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        query:
          type: string
        domain:
          type: string
      required:
        - id
        - label
        - query
        - domain

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
